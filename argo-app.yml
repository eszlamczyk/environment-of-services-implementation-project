apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: phoenix-auth-system
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/eszlamczyk/environment-of-services-implementation-project.git
    targetRevision: master
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true