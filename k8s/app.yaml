apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-api
  template:
    metadata:
      labels:
        app: auth-api
    spec:
      containers:
        - name: auth-api
          image: auth-api:local
          imagePullPolicy: Never # Mówi minikube, żeby brał obraz z lokalnego cache
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: auth-secrets
          env:
            - name: PHX_HOST
              value: "localhost"
            - name: PORT
              value: "4000"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-api
  annotations:
    # MAGIA DLA PROMETHEUSA:
    prometheus.io/scrape: "true"
    prometheus.io/port: "4000"
    prometheus.io/path: "/metrics"
spec:
  type: NodePort
  selector:
    app: auth-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4000
      nodePort: 30000